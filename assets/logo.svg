<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Magnifying glass circle (the "scope") -->
  <circle cx="52" cy="48" r="30" stroke="url(#lens)" stroke-width="4.5" fill="none"/>

  <!-- Handle -->
  <line x1="73" y1="69" x2="92" y2="88" stroke="url(#lens)" stroke-width="5" stroke-linecap="round"/>

  <!-- Mini bar chart inside the lens (city data) -->
  <rect x="35" y="52" width="7" height="16" rx="1" fill="url(#bars)"/>
  <rect x="45" y="40" width="7" height="28" rx="1" fill="url(#bars)"/>
  <rect x="55" y="46" width="7" height="22" rx="1" fill="url(#bars)"/>
  <rect x="65" y="36" width="7" height="32" rx="1" fill="url(#bars)"/>

  <!-- Trend arrow (growth) -->
  <polyline
    points="36,58 47,48 57,52 67,38"
    stroke="url(#accent)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <circle cx="67" cy="38" r="2.5" fill="#10b981"/>

  <!-- Text: city -->
  <text x="110" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="1" fill="#1e1b4b">city</text>

  <!-- Text: scope -->
  <text x="192" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="300" letter-spacing="1" fill="#6366f1">scope</text>

  <!-- Tagline -->
  <text x="112" y="78" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="3" fill="#94a3b8">REAL ESTATE DATA PIPELINE</text>
</svg>
